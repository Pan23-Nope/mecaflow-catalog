<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanical Catalog | Products by Stage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        h1,
        h2,
        h3,
        .heading-font {
            font-family: 'Outfit', sans-serif;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card:hover {
            border-color: rgba(59, 130, 246, 0.5);
        }

        .accent-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
    </style>
</head>

<body class="min-h-screen">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 glass-card px-6 py-4 flex justify-between items-center bg-slate-900/80">
        <a href="index.html" class="flex items-center gap-2 group">
            <div
                class="w-10 h-10 accent-gradient rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20 transition-transform group-hover:scale-110">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </div>
            <span class="text-xl font-bold tracking-tight text-white uppercase heading-font">SCM Viet Nam</span>
        </a>
        <div class="hidden md:flex gap-8 text-sm font-medium">
            <a href="index.html" class="text-blue-400 border-b-2 border-blue-500 pb-1">Trang Chủ</a>
            <a href="#product-grid" class="text-slate-400 hover:text-white transition-colors">Sản phẩm</a>
            <a href="admin.html" class="text-slate-400 hover:text-white transition-colors flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Đăng nhập
            </a>
        </div>
        <button class="md:hidden text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-12">
        <header class="mb-12">
            <h1
                class="text-4xl md:text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400">
                Danh Mục Linh Kiện Gia Công
            </h1>
            <p class="text-slate-400 text-lg max-w-2xl">
                Quản lý và theo dõi các sản phẩm cơ khí qua từng công đoạn sản xuất, được phân loại theo từng khách hàng
                chiến lược.
            </p>
        </header>

        <!-- Filters -->
        <div class="flex flex-wrap gap-3 mb-12" id="customer-tabs">
            <button class="px-6 py-2 rounded-full glass-card text-blue-400 border-blue-500/50 font-medium">Tất
                cả</button>
            <!-- Dynamic Buttons will go here -->
        </div>

        <!-- Product Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="product-grid">
            <!-- Loading State or Empty State -->
            <div class="col-span-full py-20 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mb-4">
                </div>
                <p class="text-slate-500">Đang tải dữ liệu sản phẩm...</p>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-800 py-8 text-center text-slate-500 text-sm">
        <p>&copy; 2026 Minh Huy Engineering. All rights reserved.</p>
    </footer>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
</body>

</html>
