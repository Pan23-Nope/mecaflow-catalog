<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MecaFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .accent-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
    </style>
</head>

<body class="min-h-screen bg-[#0f172a]">
    <!-- Shared Navbar -->
    <nav class="sticky top-0 z-50 glass-card px-6 py-4 flex justify-between items-center bg-slate-900/80">
        <a href="index.html" class="flex items-center gap-2 group">
            <div
                class="w-10 h-10 accent-gradient rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20 transition-transform group-hover:scale-110">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </div>
            <span class="text-xl font-bold tracking-tight text-white uppercase heading-font">MecaFlow</span>
        </a>
        <div class="hidden md:flex gap-8 text-sm font-medium">
            <a href="index.html" class="text-slate-400 hover:text-white transition-colors">Trang Chủ</a>
            <a href="admin.html" class="text-blue-400 border-b-2 border-blue-500 pb-1 flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Admin
            </a>
        </div>
        <button class="md:hidden text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>
    </nav>

    <div class="min-h-[calc(100vh-80px)] flex flex-col items-center justify-center p-6">
        <!-- Login Modal -->
        <div id="login-modal" class="glass-card w-full max-w-md p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-8">
                <div class="inline-block p-4 accent-gradient rounded-full mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold font-['Outfit']">Admin Portal</h1>
                <p class="text-slate-400 text-sm mt-2">Truy cập hệ thống quản trị sản phẩm</p>
            </div>
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Tên đăng nhập</label>
                    <input type="text" id="username" required
                        class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 text-white focus:outline-none focus:border-blue-500 transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Mật khẩu</label>
                    <input type="password" id="password" required
                        class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 text-white focus:outline-none focus:border-blue-500 transition-colors">
                </div>
                <button type="submit"
                    class="w-full py-3 accent-gradient text-white font-bold rounded-lg hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
                    Đăng Nhập
                </button>
                <p id="login-error" class="hidden text-red-400 text-sm text-center">Sai thông tin đăng nhập!</p>
            </form>
        </div>

        <!-- Dashboard (Hidden initially) -->
        <div id="dashboard" class="hidden w-full max-w-7xl">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-12">
                <div>
                    <h1 class="text-3xl font-bold font-['Outfit']">Quản Lý Sản Phẩm</h1>
                    <p class="text-slate-400">Thêm, sửa, xóa linh kiện và khách hàng</p>
                </div>
                <div class="flex gap-4">
                    <button id="add-product-btn"
                        class="px-6 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-colors">
                        + Thêm Sản Phẩm
                    </button>
                    <button id="logout-btn"
                        class="px-6 py-2 glass-card text-slate-400 font-medium rounded-lg hover:text-white transition-colors">
                        Đăng Xuất
                    </button>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Form Section -->
                <div class="lg:col-span-1 glass-card p-6 rounded-xl h-fit sticky top-6">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                        </svg>
                        Thông Tin Sản Phẩm
                    </h2>
                    <form id="product-form" class="space-y-4">
                        <input type="hidden" id="item-id">
                        <div>
                            <label class="block text-xs uppercase tracking-wider text-slate-500 font-bold mb-1">Mã Sản
                                Phẩm</label>
                            <input type="text" id="prod-code" required
                                class="w-full px-3 py-2 rounded bg-slate-800 border border-slate-700 text-white text-sm">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-wider text-slate-500 font-bold mb-1">Tên Sản
                                Phẩm</label>
                            <input type="text" id="prod-name" required
                                class="w-full px-3 py-2 rounded bg-slate-800 border border-slate-700 text-white text-sm">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-wider text-slate-500 font-bold mb-1">Vật
                                Liệu</label>
                            <input type="text" id="prod-material" required
                                class="w-full px-3 py-2 rounded bg-slate-800 border border-slate-700 text-white text-sm">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-wider text-slate-500 font-bold mb-1">Khách
                                Hàng</label>
                            <select id="prod-customer" required
                                class="w-full px-3 py-2 rounded bg-slate-800 border border-slate-700 text-white text-sm">
                                <option value="">Chọn khách hàng...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-wider text-slate-500 font-bold mb-1">Hình
                                Ảnh</label>
                            <div
                                class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-slate-700 border-dashed rounded-md">
                                <div class="space-y-1 text-center font-['Outfit']">
                                    <svg class="mx-auto h-12 w-12 text-slate-400" stroke="currentColor" fill="none"
                                        viewBox="0 0 48 48">
                                        <path
                                            d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02"
                                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                    </svg>
                                    <div class="flex text-sm text-slate-400">
                                        <label
                                            class="relative cursor-pointer bg-transparent rounded-md font-medium text-blue-500 hover:text-blue-400 focus-within:outline-none">
                                            <span>Tải lên tệp</span>
                                            <input id="prod-image-file" name="file" type="file" class="sr-only">
                                        </label>
                                        <p class="pl-1">hoặc kéo thả</p>
                                    </div>
                                    <p class="text-xs text-slate-500">PNG, JPG, GIF up to 10MB</p>
                                </div>
                            </div>
                        </div>
                        <div class="pt-4 flex gap-2">
                            <button type="submit"
                                class="flex-1 py-2 bg-blue-600 text-white text-sm font-bold rounded hover:bg-blue-700 transition">Lưu
                                Lại</button>
                            <button type="reset"
                                class="px-4 py-2 glass-card text-xs font-bold rounded hover:bg-slate-700 transition">Hủy</button>
                        </div>
                    </form>
                </div>

                <!-- List Section -->
                <div class="lg:col-span-2 space-y-4" id="admin-product-list">
                    <!-- List of products will go here with edit/delete buttons -->
                </div>
            </div>
        </div>

        <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
        <script src="supabase-config.js"></script>
        <script src="admin.js"></script>
</body>

</html>
